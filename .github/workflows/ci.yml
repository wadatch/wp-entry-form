name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check (php -l)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -path ./vendor -prune -o -name '*.php' -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "PHP ファイルがまだありません。スキップします。"
            exit 0
          fi
          for f in "${files[@]}"; do
            php -l "$f"
          done

  build-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # フロントエンドのビルドが通ることを PR 段階で確認する。
      # main マージ＝即リリースのため、ここで壊れたビルドを止めてリリース失敗を防ぐ。
      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build:assets
