name: Release plugin

# main への push（= PR マージ）のたびに自動採番してリリースする。
# 採番形式: MAJOR.YYYYMMDD.連番（例 0.20260609.1）。詳細は docs/versioning.md。
#   - MAJOR は wp-entry-form.php の WPEF_MAJOR_VERSION（破壊的変更時のみ手動 +1）
#   - YYYYMMDD はマージ日（JST）
#   - 連番は同 MAJOR.日付 の既存タグ数 + 1
on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (MAJOR.YYYYMMDD.seq)
        id: ver
        env:
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          git fetch --tags --force origin >/dev/null 2>&1 || true

          MAJOR=$(grep 'WPEF_MAJOR_VERSION' wp-entry-form.php | grep -oE '[0-9]+' | tail -1)
          if [ -z "${MAJOR:-}" ]; then
            echo "wp-entry-form.php から WPEF_MAJOR_VERSION を取得できませんでした。" >&2
            exit 1
          fi

          DATE=$(date +%Y%m%d)
          PREFIX="v${MAJOR}.${DATE}."
          COUNT=$(git tag --list "${PREFIX}*" | wc -l | tr -d ' ')
          SEQ=$((COUNT + 1))
          TAG="${PREFIX}${SEQ}"
          # 手動タグ等との衝突に備えて空き番号まで進める。
          while git rev-parse "${TAG}" >/dev/null 2>&1; do
            SEQ=$((SEQ + 1))
            TAG="${PREFIX}${SEQ}"
          done

          VERSION="${MAJOR}.${DATE}.${SEQ}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "採番: ${TAG}"

      - name: Build plugin zip
        env:
          WPEF_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: bash bin/build.sh

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            dist/wp-entry-form.zip \
            --title "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --generate-notes
