name: Release plugin

# main への push（= PR マージ）のたびに自動採番してリリースする。
# 採番形式: MAJOR.MINOR.PATCH（例 0.1.0）。詳細は docs/versioning.md。
#   - MAJOR/MINOR は wp-entry-form.php の WPEF_MAJOR_VERSION / WPEF_MINOR_VERSION（手動で変更）
#   - PATCH（一番下の数字）は同 MAJOR.MINOR の既存タグ数から自動インクリメント（初回は 0）
on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (MAJOR.MINOR.PATCH)
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force origin >/dev/null 2>&1 || true

          MAJOR=$(grep "define( 'WPEF_MAJOR_VERSION'" wp-entry-form.php | grep -oE '[0-9]+' | tail -1)
          MINOR=$(grep "define( 'WPEF_MINOR_VERSION'" wp-entry-form.php | grep -oE '[0-9]+' | tail -1)
          if [ -z "${MAJOR:-}" ] || [ -z "${MINOR:-}" ]; then
            echo "wp-entry-form.php から MAJOR/MINOR を取得できませんでした。" >&2
            exit 1
          fi

          PREFIX="v${MAJOR}.${MINOR}."
          # 同 MAJOR.MINOR の既存タグ数を PATCH の起点にする（初回は 0 → MAJOR.MINOR.0）。
          PATCH=$(git tag --list "${PREFIX}*" | wc -l | tr -d ' ')
          TAG="${PREFIX}${PATCH}"
          # 既存タグと衝突する場合は空き番号まで進める。
          while git rev-parse "${TAG}" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            TAG="${PREFIX}${PATCH}"
          done

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "採番: ${TAG}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Build plugin zip
        env:
          WPEF_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: bash bin/build.sh

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            dist/wp-entry-form.zip \
            --title "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --generate-notes
